services:
  server:
    container_name: tix-server
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./server:/app
      - /app/node_modules
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=development
      - PORT=3000
    command: npm run dev

  ui:
    container_name: tix-ui
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./ui:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    command: npm run dev
    depends_on:
      - server

  postgres:
    container_name: tix-db
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=tix_user
      - POSTGRES_PASSWORD=tix_password
      - POSTGRES_DB=tix_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
